<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人網站</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div class="wrapper">
        <section id="init-page" class="page-section active" style="display: flex;">
            <div class="rimuru-core"></div>
            <h2 style="letter-spacing: 8px; margin-bottom: 30px;">MY WEB</h2>
            <button class="btn-main" onclick="runEffect(this, () => switchPage('menu-grid'), 'pc-open')">OPEN</button>
        </section>

        <section id="menu-grid" class="page-section">
            <button class="close-btn" onclick="runEffect(this, goBack, 'close')">×</button>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('status-win', '《作品展示》'), 'pc-open')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/Y1PtqpWHKzMAAAAC/maria-mikhailovna-kujou-alya-sometimes-hides-her-feelings-in-russian.gif"></div>
                <div class="text-content"><div class="tag">PORTFOLIO</div><h3>作品集</h3></div>
            </div>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('nation-win', '《關於我》'), 'pc-open')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/5WKu2y1Rx1UAAAAC/franklin-lamar.gif"></div>
                <div class="text-content"><div class="tag">PROFILE</div><h3>關於我</h3></div>
            </div>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('skill-win', '《聯絡方式》'), 'pc-open')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/MYo3MGCRzwUAAAAC/%E3%83%AA%E3%83%A0%E3%83%AB-rimuru-tempest.gif"></div>
                <div class="text-content"><div class="tag">SOCIAL</div><h3>聯絡方式</h3></div>
            </div>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('memo-win', '《尚未完成》'), 'pc-open')">
                <div class="box-icon"><img src="https://i.imgur.com/YvO54Ny.gif"></div>
                <div class="text-content"><div class="tag">SYSTEM</div><h3>尚未完成</h3></div>
            </div>
        </section>

        <section id="detail-section" class="page-section" style="justify-content: center; align-items: center;">
            <div id="detail-card" class="detail-page">
                <button class="close-btn" onclick="runEffect(this, goBack, 'close')">×</button>
                <h2 id="detail-title" style="color:var(--rimuru-blue); border-bottom:1px solid; padding-bottom:10px;"></h2>
                <div id="detail-content" style="margin-top:20px; overflow-y:auto;"></div>
            </div>
        </section>
    </div>

    <template id="tpl-status-win">
        <table>
            <tr onclick="window.open('https://slime-r1muru.github.io/water-puzzle/', '_blank')">
                <td class="clickable-td"><strong>專案01-水排序</strong></td>
            </tr>
        </table>
    </template>
    <template id="tpl-nation-win">
        <div class="simple-text">
            <p><strong>姓名</strong>：Jimmy</p>
            <p><strong>興趣</strong>：動漫、籃球、棒球、傳說對決</p>
            <p><strong>近期目標</strong>：考駕照、買車、出國</p>
        </div>
    </template>
    <template id="tpl-skill-win">
        <table>
            <tr onclick="window.open('https://github.com/slime-r1muru', '_blank')">
                <td class="clickable-td"><strong>GITHUB</strong></td>
            </tr>
            <tr onclick="window.open('https://www.instagram.com/xiao.__.chang', '_blank')">
                <td class="clickable-td"><strong>INSTAGRAM</strong></td>
            </tr>
            <tr onclick="copyToClipboard('5b2g0017@stust.edu.tw', this)">
                <td class="clickable-td"><strong class="copy-label">GMAIL(點擊複製)</strong></td>
            </tr>
        </table>
    </template>
    <template id="tpl-memo-win">
        <div class="simple-text">coming soon...</div>
    </template>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = initCanvas;
        initCanvas();
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1, speedX: Math.random() * 0.4 - 0.2, speedY: Math.random() * 0.4 - 0.2, opacity: Math.random() * 0.5 + 0.2
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
                if (p.y > canvas.height || p.y < 0) p.speedY *= -1;
                ctx.fillStyle = `rgba(160, 216, 239, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function runEffect(el, callback, type) {
            el.classList.add('effect-active');
            let delay = 300;
            const isMobile = window.innerWidth < 1501;
            if (type === 'pc-open') {
                delay = 150; 
            } else if (type === 'close') {
                delay = isMobile ? 250 : 50;
            }
            setTimeout(() => {
                el.classList.remove('effect-active');
                if(callback) callback();
            }, delay);
        }

        function switchPage(pageId) {
            const allPages = document.querySelectorAll('.page-section');
            const target = document.getElementById(pageId);
            const activePage = document.querySelector('.page-section.active');
            if (activePage) activePage.classList.remove('active');
            allPages.forEach(p => { if (p.id !== pageId) p.style.display = 'none'; });
            target.style.display = (pageId === 'menu-grid') ? 'grid' : 'flex';
            void target.offsetHeight; 
            requestAnimationFrame(() => { target.classList.add('active'); });
        }

        function goBack() {
            const activePage = document.querySelector('.page-section.active').id;
            if (activePage === 'detail-section') switchPage('menu-grid');
            else if (activePage === 'menu-grid') switchPage('init-page');
        }

        function openDetail(dataId, titleText) {
            const contentArea = document.getElementById('detail-content');
            const template = document.getElementById('tpl-' + dataId);
            document.getElementById('detail-title').innerText = titleText;
            contentArea.innerHTML = '';
            contentArea.appendChild(template.content.cloneNode(true));
            switchPage('detail-section');
        }

        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const label = element.querySelector('.copy-label');
                const originalText = label.innerText;
                label.style.color = "var(--success-green)";
                label.innerText = "SUCCESS! 已複製";
                setTimeout(() => { label.style.color = ""; label.innerText = originalText; }, 2000);
            });
        }
    </script>
</body>
</html>
