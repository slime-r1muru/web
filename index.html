<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人網站</title>
    <style>
        :root {
            --rimuru-blue: #a0d8ef;
            --deep-space: #0a0f1d;
            --box-gap: 20px;
            --text-gap: 8px;
            --icon-max-size: 140px;
            --success-green: #2ecc71;
            --error-red: #ff4757;
        }

        body {
            margin: 0;
            background-color: var(--deep-space);
            color: #fff;
            font-family: 'Orbitron', 'PingFang TC', sans-serif;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a2a4a 0%, #0a0f1d 100%);
        }

        .wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .page-section {
            display: none;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%;
            height: 100%;
            position: absolute;
            box-sizing: border-box;
        }

        .page-section.active {
            opacity: 1;
            transform: scale(1);
        }

        /* --- 啟動頁面 --- */
        #init-page {
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .rimuru-core {
            width: 160px; height: 130px;
            background: linear-gradient(135deg, #a0d8ef 0%, #3498db 100%);
            border-radius: 50% 50% 45% 45% / 65% 65% 35% 35%;
            margin-bottom: 30px;
            box-shadow: 0 0 50px var(--rimuru-blue);
            animation: slimeFloat 4s infinite ease-in-out;
        }

        @keyframes slimeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .btn-main {
            background: transparent;
            border: 2px solid var(--rimuru-blue);
            color: var(--rimuru-blue);
            padding: 18px 50px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-main:hover {
            background-color: var(--rimuru-blue);
            color: var(--deep-space);
            transform: scale(1.15);
        }

        /* --- 選單排版 --- */
        #menu-grid {
            display: none;
            grid-template-columns: repeat(2, 320px);
            grid-template-rows: repeat(2, 300px);
            column-gap: 40px;
            row-gap: 40px;
            justify-content: center;
            align-content: center;
        }

        .menu-box {
            background: rgba(10, 15, 29, 0.7);
            border: 1px solid rgba(160, 216, 239, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(8px);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: var(--box-gap);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .box-icon {
            width: 100%;
            height: var(--icon-max-size);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .box-icon img {
            max-width: 90%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 20px;
            filter: drop-shadow(0 0 5px rgba(160, 216, 239, 0.4));
            transition: all 0.8s ease;
        }

        /* 電腦版特效 (1501px 以上) */
        @media (min-width: 1501px) {
            .menu-box:hover {
                background: rgba(160, 216, 239, 0.15);
                border-color: var(--rimuru-blue);
                transform: translateY(-15px);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(160, 216, 239, 0.3);
            }
            .menu-box:hover .box-icon { transform: scale(1.1); }
            .menu-box:hover .box-icon img { filter: drop-shadow(0 0 15px var(--rimuru-blue)); }
        }

        /* 點擊特效 */
        .effect-active {
            transform: scale(0.92) !important;
            background: rgba(160, 216, 239, 0.4) !important;
            border-color: var(--rimuru-blue) !important;
            transition: transform 0.1s ease !important;
        }

        /* 手機與橫向 */
        @media (max-width: 1500px), (max-height: 600px) {
            body { overflow-y: auto !important; height: auto !important; }
            .wrapper { height: auto !important; min-height: 100vh; display: block !important; padding: 0 !important; }
            
            .page-section { position: relative !important; height: auto !important; display: none; padding: 40px 0; }
            .page-section.active { display: flex !important; flex-direction: column !important; align-items: center !important; }

            /* 關鍵修正：讓手機版 OPEN 畫面垂直水平置中 */
            #init-page.active {
                height: 100vh !important; /* 強制佔滿螢幕高度 */
                justify-content: center !important; /* 垂直置中 */
                padding: 0 !important;
            }

            #menu-grid {
                display: none;
                grid-template-columns: repeat(2, 1fr) !important;
                grid-template-rows: repeat(2, 180px) !important;
                width: 92%;
                padding: 10px;
                column-gap: 20px;
                row-gap: 40px;
                align-content: start;
                padding-top: 80px;
                margin: 0 auto;
            }
            #menu-grid.active { display: grid !important; }

            .menu-box {
                padding: 10px !important;
                border-radius: 25px;
                min-height: 100px !important;
                height: 100% !important;
                transition: transform 0.2s ease, background 0.2s ease !important;
            }

            .box-icon { height: 90px; }
            h3 { font-size: 1.1rem; }

            .close-btn {
                position: fixed !important;
                top: 20px !important;
                right: 20px !important;
                z-index: 10000 !important;
                width: 45px !important;
                height: 45px !important;
                font-size: 1.5rem !important;
            }
        }

        .text-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--text-gap);
        }

        .tag { font-size: 0.8rem; color: var(--rimuru-blue); opacity: 0.7; letter-spacing: 2px; }
        h3 { font-size: 1.6rem; margin: 0; letter-spacing: 4px; font-weight: bold; }

        /* --- 詳細頁面 --- */
        .detail-page {
            width: 85%;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--rimuru-blue);
            border-radius: 30px;
            padding: 50px;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .close-btn {
            position: fixed;
            top: 30px; right: 30px;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .close-btn:hover, .close-btn:active {
            background: var(--error-red) !important;
            transform: rotate(90deg) scale(1.1) !important;
        }

        table { width: 100%; border-spacing: 0 15px; }
        
        .clickable-td {
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(160, 216, 239, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .clickable-td:hover { background: rgba(160, 216, 239, 0.15); border-color: var(--rimuru-blue); }
        .clickable-td:active { transform: scale(0.96); background: rgba(160, 216, 239, 0.3); }

        .simple-text { font-size: 1.2rem; line-height: 1.6; color: #fff; }
        .copy-label { transition: color 0.4s ease; }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div class="wrapper">
        <section id="init-page" class="page-section active" style="display: flex;">
            <div class="rimuru-core"></div>
            <h2 style="letter-spacing: 8px; margin-bottom: 30px;">MY WEB</h2>
            <button class="btn-main" onclick="runEffect(this, () => switchPage('menu-grid'), 'pc-open')">OPEN</button>
        </section>

        <section id="menu-grid" class="page-section">
            <button class="close-btn" onclick="runEffect(this, goBack, 'close')">×</button>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('status-win', '《作品展示》'), 'pc-open')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/Y1PtqpWHKzMAAAAC/maria-mikhailovna-kujou-alya-sometimes-hides-her-feelings-in-russian.gif"></div>
                <div class="text-content"><div class="tag">PORTFOLIO</div><h3>作品集</h3></div>
            </div>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('nation-win', '《關於我》'), 'pc-open')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/5WKu2y1Rx1UAAAAC/franklin-lamar.gif"></div>
                <div class="text-content"><div class="tag">PROFILE</div><h3>關於我</h3></div>
            </div>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('skill-win', '《聯絡方式》'), 'pc-open')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/MYo3MGCRzwUAAAAC/%E3%83%AA%E3%83%A0%E3%83%AB-rimuru-tempest.gif"></div>
                <div class="text-content"><div class="tag">SOCIAL</div><h3>聯絡方式</h3></div>
            </div>
            <div class="menu-box" onclick="runEffect(this, () => openDetail('memo-win', '《尚未完成》'), 'pc-open')">
                <div class="box-icon"><img src="https://i.imgur.com/YvO54Ny.gif"></div>
                <div class="text-content"><div class="tag">SYSTEM</div><h3>尚未完成</h3></div>
            </div>
        </section>

        <section id="detail-section" class="page-section" style="justify-content: center; align-items: center;">
            <div id="detail-card" class="detail-page">
                <button class="close-btn" onclick="runEffect(this, goBack, 'close')">×</button>
                <h2 id="detail-title" style="color:var(--rimuru-blue); border-bottom:1px solid; padding-bottom:10px;"></h2>
                <div id="detail-content" style="margin-top:20px; overflow-y:auto;"></div>
            </div>
        </section>
    </div>

    <template id="tpl-status-win">
        <table>
            <tr onclick="window.open('https://5b2g0017-asdfg.github.io/water-puzzle/', '_blank')">
                <td class="clickable-td"><strong>專案01-水排序</strong></td>
            </tr>
        </table>
    </template>
    <template id="tpl-nation-win">
        <div class="simple-text">
            <p><strong>姓名</strong>：Jimmy</p>
            <p><strong>興趣</strong>：動漫、籃球、棒球、傳說對決</p>
            <p><strong>近期目標</strong>：考駕照、存錢買車、存錢出國</p>
        </div>
    </template>
    <template id="tpl-skill-win">
        <table>
            <tr onclick="window.open('https://github.com/5b2g0017-asdfg', '_blank')">
                <td class="clickable-td"><strong>GITHUB</strong></td>
            </tr>
            <tr onclick="window.open('https://www.instagram.com/xiao.__.chang', '_blank')">
                <td class="clickable-td"><strong>INSTAGRAM</strong></td>
            </tr>
            <tr onclick="copyToClipboard('5b2g0017@stust.edu.tw', this)">
                <td class="clickable-td"><strong class="copy-label">GMAIL(點擊複製)</strong></td>
            </tr>
        </table>
    </template>
    <template id="tpl-memo-win">
        <div class="simple-text">coming soon...</div>
    </template>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = initCanvas;
        initCanvas();
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1, speedX: Math.random() * 0.4 - 0.2, speedY: Math.random() * 0.4 - 0.2, opacity: Math.random() * 0.5 + 0.2
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
                if (p.y > canvas.height || p.y < 0) p.speedY *= -1;
                ctx.fillStyle = `rgba(160, 216, 239, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function runEffect(el, callback, type) {
            el.classList.add('effect-active');
            let delay = 300;
            const isMobile = window.innerWidth < 1501;
            if (type === 'pc-open') {
                delay = 150; 
            } else if (type === 'close') {
                delay = isMobile ? 250 : 50;
            }
            setTimeout(() => {
                el.classList.remove('effect-active');
                if(callback) callback();
            }, delay);
        }

        function switchPage(pageId) {
            const allPages = document.querySelectorAll('.page-section');
            const target = document.getElementById(pageId);
            const activePage = document.querySelector('.page-section.active');
            if (activePage) activePage.classList.remove('active');
            allPages.forEach(p => { if (p.id !== pageId) p.style.display = 'none'; });
            target.style.display = (pageId === 'menu-grid') ? 'grid' : 'flex';
            void target.offsetHeight; 
            requestAnimationFrame(() => { target.classList.add('active'); });
        }

        function goBack() {
            const activePage = document.querySelector('.page-section.active').id;
            if (activePage === 'detail-section') switchPage('menu-grid');
            else if (activePage === 'menu-grid') switchPage('init-page');
        }

        function openDetail(dataId, titleText) {
            const contentArea = document.getElementById('detail-content');
            const template = document.getElementById('tpl-' + dataId);
            document.getElementById('detail-title').innerText = titleText;
            contentArea.innerHTML = '';
            contentArea.appendChild(template.content.cloneNode(true));
            switchPage('detail-section');
        }

        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const label = element.querySelector('.copy-label');
                const originalText = label.innerText;
                label.style.color = "var(--success-green)";
                label.innerText = "SUCCESS! 已複製";
                setTimeout(() => { label.style.color = ""; label.innerText = originalText; }, 2000);
            });
        }
    </script>
</body>
</html>
